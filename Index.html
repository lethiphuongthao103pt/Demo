<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Vision - THCS Nguyễn Trãi</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    :root {
      --green-dark: #1b5e20;
      --green-mid: #2e7d32;
      --green-light: #4caf50;
      --bg-home: linear-gradient(180deg, #ffffff 0%, #dcedc8 100%);
      --bg-scan: linear-gradient(180deg, #e8f5e9 0%, #a5d6a7 100%);
      --btn-grad: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at center, #c8e6c9 0%, #81c784 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone {
      width: 375px;
      height: 750px;
      border-radius: 45px;
      border: 10px solid #222;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4), inset 0 0 0 2px #555;
      background: white;
    }

    /* Notch */
    .phone::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #222;
      border-radius: 0 0 18px 18px;
      z-index: 999;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .screen.active {
      display: flex;
    }

    /* ===================== TRANG CHỦ ===================== */
    #home-screen {
      background: var(--bg-home);
      padding-top: 50px;
    }

    .leaf {
      position: absolute;
      background-image: url('https://cdn-icons-png.flaticon.com/512/892/892926.png');
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 1;
      opacity: 0.5;
      animation: sway 4s ease-in-out infinite alternate;
    }

    @keyframes sway {
      from {
        transform: rotate(-5deg) translateY(0);
      }

      to {
        transform: rotate(10deg) translateY(10px);
      }
    }

    .leaf-tl {
      width: 110px;
      height: 110px;
      top: -15px;
      left: -25px;
      transform: rotate(110deg);
      z-index: 2;
    }

    .leaf-tr {
      width: 65px;
      height: 65px;
      top: 55px;
      right: -15px;
      transform: rotate(-20deg);
      animation-delay: 1s;
      z-index: 2;
    }

    .leaf-ml {
      width: 150px;
      height: 150px;
      top: 340px;
      left: -55px;
      opacity: .3;
      transform: rotate(45deg);
      animation-delay: 2s;
